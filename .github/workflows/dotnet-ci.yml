name: .NET CI and Docker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: virtual-tickets-api

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore VirtualTickets.Api.csproj

      - name: Build
        run: dotnet build VirtualTickets.Api.csproj --configuration Release --no-restore

      - name: Run tests
        shell: bash
        run: |
          test_projects=$(find . \( -name "*Tests.csproj" -o -name "*Test.csproj" \))

          if [ -z "$test_projects" ]; then
            echo "No test projects found. Skipping tests."
          else
            while IFS= read -r project; do
              echo "Running tests for $project"
              dotnet test "$project" \
                --configuration Release \
                --verbosity normal
            done <<< "$test_projects"
          fi

      - name: Publish application
        run: |
          dotnet publish VirtualTickets.Api.csproj \
            --configuration Release \
            --no-build \
            --output ./publish

      - name: Upload published application
        uses: actions/upload-artifact@v7
        with:
          name: published-api
          path: ./publish
          if-no-files-found: error
          retention-days: 7

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: build-and-test

    # Do not push images for pull requests
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Convert repository owner to lowercase
        id: image
        shell: bash
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "repository=ghcr.io/$OWNER/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.repository }}:latest
            ${{ steps.image.outputs.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max